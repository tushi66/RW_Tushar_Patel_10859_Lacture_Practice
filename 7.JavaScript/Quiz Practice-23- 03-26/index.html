<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <link rel="stylesheet" href="./css/style.css">
</head>

<body>


    <div class="quiz-wrapper">

        <!-- Quiz Container -->
        <div class="quiz-container" id="quizContainer">

            <!-- Header -->
            <div class="quiz-header">
                <div class="quiz-title">JavaScript Quiz</div>
                <div class="timer" id="timer">05:00</div>

                <div class="progress-bar-container">
                    <div class="quiz-progress" id="progressBar"></div>
                </div>
            </div>

            <!-- Body -->
            <div class="quiz-body">

                <!-- Question -->
                <h2 id="question">Question will appear here...</h2>

                <!-- Options -->
                <div id="quizBody">

                    <div class="answer-option">Option 1</div>
                    <div class="answer-option">Option 2</div>
                    <div class="answer-option">Option 3</div>
                    <div class="answer-option">Option 4</div>

                </div>

            </div>

            <!-- Footer -->
            <div class="quiz-footer">
                <span id="questionCounter">1 / 10</span>
                <button class="btn-next" id="nextBtn">Next</button>
            </div>

        </div>

        <!-- Result Section -->
        <div class="results-container" id="resultsContainer">

            <h2>Quiz Completed 🎉</h2>

            <h1 id="finalScore">0/10</h1>

            <p>
                Correct: <span id="correctCount">0</span> |
                Wrong: <span id="incorrectCount">0</span>
            </p>

            <p>Time: <span id="timeTaken">0s</span></p>

            <button class="btn-restart" id="restartBtn">Restart</button>

        </div>

    </div>



    <script src="script.js">

    </script>
</body>

</html>
