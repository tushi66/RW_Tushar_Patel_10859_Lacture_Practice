<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="container">
        <form>
            <div class="row"> <!-- Added row -->
                <div class="col-md-6">
                    <h1>General Information</h1>

                    <select>
                        <option>Title</option>
                        <option>Mr</option>
                        <option>Mrs</option>
                        <option>Miss</option>
                    </select>

                    <div class="row-flex">
                        <input type="text" placeholder="First Name">
                        <input type="text" placeholder="Last Name">
                    </div>

                    <select>
                        <option>Position</option>
                        <option>CA</option>
                        <option>Developer</option>
                        <option>Website designer</option>
                        <option>Engineer</option>
                    </select>

                    <input type="text" placeholder="Company">

                    <div class="row-flex">
                        <input type="text" placeholder="Business Arena">
                        <select>
                            <option>Employees</option>
                            <option>CFO</option>
                            <option>Hr</option>
                            <option>Junior</option>
                            <option>Senior</option>
                        </select>
                    </div>
                </div>

                <div class="col-md-6">
                    <h1>Contact Details</h1>

                    <input type="text" placeholder="Street + Nr">
                    <input type="text" placeholder="Additional Information">

                    <div class="row-flex">
                        <input type="text" placeholder="Zip Code">
                        <select>
                            <option>Place</option>
                            <option>Surat</option>
                            <option>Baroda</option>
                            <option>Mumbai</option>
                            <option>Delhi</option>
                        </select>
                    </div>

                    <select>
                        <option>Country</option>
                        <option>US</option>
                        <option>UK</option>
                        <option>India</option>
                        <option>Canada</option>
                    </select>

                    <div class="row-flex">
                        <input type="text" placeholder="Code +">
                        <input type="text" placeholder="Phone Number">
                    </div>

                    <input type="email" placeholder="Your Email">

                    <div class="checkbox">
                        <input type="checkbox" id="terms">
                        <label for="terms">I accept Terms & Conditions</label>
                    </div>

                    <button type="submit">Register Badge</button>
                </div>
            </div>
        </form>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>



    <script src="./js/script.js"></script>

</body>

</html>
