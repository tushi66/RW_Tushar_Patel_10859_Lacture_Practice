<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container {
            margin: 50px 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 800px;
            flex-direction: column;
            background-color: steelblue;
            color: white;
            text-align: center;
            border-radius: 50px;
            box-shadow: 0px 5px 80px #3c3c3caa;
        }

        .studentsform {
            background-color: darkmagenta;
            padding: 50px;
            border: none;
            border-radius: 20px;
            box-shadow: 0px 20px 90px #201f1f;
        }

        .input_form {
            margin: 20px;

        }

        input {
            padding: 8px;
        }

        .btn_submit {
            padding: 10px 30px;
            cursor: pointer;
            border: none;
            border-radius: 20px;
        }

        #nameerror,
        #emailerror,
        #ageerror {
            color: red;
        }

        input.success {
            border: 2px solid limegreen;
        }
    </style>

</head>

<body>


    <div class="container">
        <h1>
            Students Form Registration
        </h1>

        <form class="studentsform" onsubmit="return validateform()">
            <div class="input_form">
                <label for="">Name</label>
                <input type="text" id="name">
                <div id="nameerror"></div>
            </div>
            <div class="input_form">
                <label for="">Email</label>
                <input type="email" id="email">
                <div id="emailerror"></div>
            </div>
            <div class="input_form">
                <label for="">Age </label>
                <input type="number" id="age">
                <div id="ageerror"></div>
            </div>

            <div class="input_form">
                <button class="btn_submit" type="submit">Submit</button>
            </div>

        </form>
    </div>

    <script src="script.js">

    </script>

</body>

</html>
