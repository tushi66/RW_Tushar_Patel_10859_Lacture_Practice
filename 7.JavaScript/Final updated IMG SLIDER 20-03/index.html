<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        p {
            background-color: rgb(225, 232, 237);
            font-size: 50px;
            text-align: center;
            margin: 50px;
            border-radius: 20px;
        }

        .container-slider {
            width: 100%;
            max-width: 1200px;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 30px #c4c2c2;
        }

        .slides {

            display: flex;
            transition: transform 0.6s ease-in-out;
        }

        .slide {
            min-width: 100%;
            height: 700px;
            position: relative;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .prev,
        .next {

            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            color: black;
            border: none;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .next {
            right: 15px;

        }

        .prev {
            left: 15px;
        }


        .prev:hover,
        .next:hover {
            background: #7c7979;
            color: white;
        }

        .dots-container {

            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 1px auto;
        }

        .dot {
            width: 14px;
            height: 14px;
            background: #a4a3a3;
            border-radius: 50%;
            transition: 0.3s;
            cursor: pointer;
        }

        .dot:hover {
            transform: scale(1.3);
            background: #585353;

        }

        .active {
            background-color: #252424;
            transform: scale(1.3);
        }

        .prev,
        .next {
            background: rgba(255, 255, 255, 0.6);
        }
    </style>



</head>

<body>

    <div class="container">

        <p> Image Slider.....</p>

    </div>



    <div class="container-slider">
        <div class="slides">
            <div class="slide">
                <img src="https://st2.depositphotos.com/2001755/5750/i/450/depositphotos_57503947-stock-photo-beautiful-landscape.jpg"
                    alt="image-slider">
                <div class="caption">
                    Beautiful Sunset

                </div>
            </div>
            <div class="slide">
                <img src="https://img.freepik.com/free-photo/morskie-oko-tatry_1204-510.jpg" alt="image-slider">
                <div class="caption">
                    lake View
                </div>
            </div>
            <div class="slide">
                <img src="https://st2.depositphotos.com/2001755/9206/i/450/depositphotos_92069190-stock-photo-beautiful-landscape-at-sunset.jpg"
                    alt="image-slider">
                <div class="caption">
                    peacefull nauter
                </div>
            </div>
            <div class="slide">
                <img src="https://thumbs.dreamstime.com/b/nature-mountain-scene-beautiful-lake-slovakia-tatra-29395938.jpg"
                    alt="image-slider">
                <div class="caption">
                    Mountain View
                </div>
            </div>
            <div class="slide">
                <img src="./img/tiger-jpg.jpg" alt="image-slider">
                <div class="caption">
                    Tiger
                </div>
            </div>
        </div>

        <button class="prev" onclick="moveslide(-1)"><i class="fa-solid fa-angle-left"></i></button>
        <button class="next" onclick="moveslide(1)"><i class="fa-solid fa-angle-right"></i></button>

        <div class="dots-container" id="dots"></div>
    </div>




    <script src="javaslide.js">


    </script>
</body>

</html>
