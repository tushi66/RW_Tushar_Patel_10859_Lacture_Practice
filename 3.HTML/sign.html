<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flipkart - Sign In / Sign Up</title>
</head>
<body>
  <h2>Flipkart</h2>

  <h3>Sign In</h3>
  <form action="/signin" method="post">
    <label for="signin-email">Email or Mobile Number:</label><br>
    <input type="text" id="signin-email" name="email" required><br><br>

    <label for="signin-password">Password:</label><br>
    <input type="password" id="signin-password" name="password" required><br><br>

    <button type="submit">Sign In</button>
  </form>

  <hr>

  <h3>New to Flipkart? Sign Up</h3>
  <form action="/signup" method="post">
    <label for="signup-name">Full Name:</label><br>
    <input type="text" id="signup-name" name="name" required><br><br>

    <label for="signup-email">Email:</label><br>
    <input type="email" id="signup-email" name="email" required><br><br>

    <label for="signup-phone">Mobile Number:</label><br>
    <input type="tel" id="signup-phone" name="phone" required><br><br>

    <label for="signup-password">Password:</label><br>
    <input type="password" id="signup-password" name="password" required><br><br>

    <button type="submit">Sign Up</button>
  </form>
</body>
</html>
