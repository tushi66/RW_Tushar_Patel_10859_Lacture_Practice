<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="container">
        <form onsubmit="return formvalidation(event)">
            <div class="row">
                <div class="col-md-6">

                    <h1>General Information</h1>

                    <select>
                        <option>Title</option>
                        <option>Mr</option>
                        <option>Mrs</option>
                        <option>Miss</option>
                    </select>

                    <div class="row-flex">
                        <div class="field">
                            <input type="text" placeholder="First Name" id="firstname">
                            <div id="firstnamerror" class="error"></div>
                        </div>

                        <div class="field">
                            <input type="text" placeholder="Last Name" id="Lastname">
                            <div id="lastnameerror" class="error"></div>
                        </div>
                    </div>

                    <select id="Position">
                        <option>Position</option>
                        <option>CA</option>
                        <option>Developer</option>
                        <option>Website designer</option>
                        <option>Engineer</option>
                    </select>
                    <div id="Positionerror" class="error"></div>

                    <input type="text" placeholder="Company" id="Company">
                    <div id="Companyerror" class="error"></div>

                    <div class="row-flex">

                        <div class="field">
                            <input type="text" id="Business" placeholder="Business">
                            <div id="Businesserror" class="error"></div>
                        </div>
                        <div class="field">

                            <select id="Employees">
                                <option>Employees</option>
                                <option>CFO</option>
                                <option>Hr</option>
                                <option>Junior</option>
                                <option>Senior</option>
                            </select>
                            <div id="Employeeserror" class="error"></div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <h1>Contact Details</h1>

                    <input type="text" placeholder="Street + Nr" id="Street">
                    <div id="Streeterror" class="error"></div>
                    <input type="text" placeholder="Additional Information" id="Additional">
                    <div id="Additionalerror" class="error"></div>

                    <div class="row-flex">
                        <div class="field">
                            <input type="text" id="zipcode" placeholder="Zipcode">
                            <div id="Ziperror" class="error"></div>
                        </div>

                        <div class="field">
                            <select id="Place">
                                <option>Place</option>
                                <option>Surat</option>
                                <option>Baroda</option>
                                <option>Mumbai</option>
                                <option>Delhi</option>
                            </select>
                            <div id="Placeerror" class="error"></div>
                        </div>
                    </div>


                    <select id="Country">
                        <option>Country</option>
                        <option>US</option>
                        <option>UK</option>
                        <option>India</option>
                        <option>Canada</option>
                    </select>
                    <div id="Countryerror" class="error"></div>

                    <div class="row-flex">
                        <div class="field">
                            <input type="text" id="code" placeholder="CountryCode">
                            <div id="Codeerror" class="error"></div>
                        </div>

                        <div class="field">
                            <input type="tel" id="Phone" placeholder="MobileNumber">
                            <div id="Phoneerror" class="error"></div>
                        </div>
                    </div>

                    <input type="email" placeholder="Your Email" id="email">
                    <div id="emailerror" class="error"></div>

                    <div class="checkbox" id="checkbox">
                        <input type="checkbox" id="terms">
                        <div id="checkboxerror" class="error"></div>
                        <label for="terms">I accept Terms & Conditions</label>
                    </div>

                    <button type="submit">Register Badge</button>
                </div>
            </div>
        </form>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>



    <script src="./js/script.js"></script>

</body>

</html>
